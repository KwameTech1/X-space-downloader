<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X Spaces Downloader</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="container">

    <header>
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        <span>Spaces Downloader</span>
      </div>
    </header>

    <main>

      <!-- ── Input card ── -->
      <div class="card" id="input-card">
        <label for="url-input">Space URL</label>
        <div class="input-row">
          <input
            type="text"
            id="url-input"
            placeholder="https://x.com/i/spaces/…"
            autocomplete="off"
            spellcheck="false"
          >
          <button id="download-btn" onclick="startDownload()">Download</button>
        </div>

        <!-- Transcription options -->
        <div class="options-row">
          <label class="toggle-label">
            <input type="checkbox" id="transcribe-chk">
            <span class="toggle-text">Transcribe audio</span>
          </label>
          <div id="transcribe-opts" class="transcribe-opts hidden">
            <label class="select-label" for="model-select">Model</label>
            <select id="model-select">
              <option value="tiny">tiny — fastest</option>
              <option value="base">base</option>
              <option value="small" selected>small — recommended</option>
              <option value="medium">medium — accurate</option>
              <option value="large-v3">large-v3 — best</option>
            </select>
          </div>
        </div>

        <p id="error-msg" class="error hidden"></p>
      </div>

      <!-- ── Progress card (shown once download begins) ── -->
      <div class="card hidden" id="progress-card">

        <!-- Metadata -->
        <div id="metadata-section" class="hidden">
          <div class="metadata-grid">
            <div class="meta-item span-2">
              <span class="meta-label">Title</span>
              <span class="meta-value" id="meta-title">—</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Host</span>
              <span class="meta-value" id="meta-host">—</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Duration</span>
              <span class="meta-value" id="meta-duration">—</span>
            </div>
          </div>
          <div class="divider"></div>
        </div>

        <!-- Progress bar -->
        <div id="progress-section">
          <div class="progress-header">
            <span id="progress-label">Starting…</span>
            <span id="progress-pct" class="progress-pct">0%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
        </div>

        <!-- Log stream -->
        <div class="log" id="log"></div>

        <!-- Output files — revealed progressively as each step completes -->
        <div id="done-section" class="hidden">
          <div class="output-files" id="output-files"></div>
        </div>

      </div>
    </main>

    <footer>
      <p>Downloads Twitter/X Space replays as MP3 · optional Whisper transcription + Claude summary</p>
    </footer>

  </div>
  <script src="/static/script.js"></script>
</body>
</html>
